<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
</head>
<body>

    <h1>Agregar Producto</h1>

    <form>
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="Nombre del producto" />
        <br><br>

        <label>Descripción</label>
        <textarea id="descripcion" placeholder="Descripcion del producto"></textarea>
        <br><br>

        <label>Precio</label>
        <input type="number" id="precio" placeholder="0.00" />
        <br><br>

        <label>Stock</label>
        <input type="number" id="stock" placeholder="0" />
        <br><br>

        <label>Genero</label>
        <select id="genero">
            <option value="">-- Seleccionar --</option>
            <option value="HOMBRE">Hombre</option>
            <option value="MUJER">Mujer</option>
            <option value="UNISEX">Unisex</option>
        </select>
        <br><br>

        <label>Marca</label>
        <select id="marca">
            <option value="">-- Seleccionar --</option>
        </select>
        <br><br>

        <label>Tipo</label>
        <select id="tipo">
            <option value="">-- Seleccionar --</option>
        </select>
        <br><br>

        <label>Imagen</label>
        <input type="file" id="imagen" accept="image/*" />
        <br><br>

        <button type="button" onclick="crearProducto()">Agregar Producto</button>
    </form>

    <p id="mensaje"></p>

    <button onclick="location.href='../dashboard/dashboard.html'">← Volver</button>

    <script src="producto.js"></script>
</body>
</html>
