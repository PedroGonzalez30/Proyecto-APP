<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrarse</title>
</head>
<body>

  <h1>Crear Cuenta</h1>

  <form>
    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre" />

    <br><br>

    <label>Email</label>
    <input type="email" id="email" placeholder="correo@gmail.com" />

    <br><br>

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="*****" />

    <br><br>

    <button type="button" onclick="registrar()">Crear cuenta</button>
  </form>

  <p id="mensaje"></p>

  <p>¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión</a></p>

  <script src="registrar.js"></script>
</body>
</html>
